{% extends "base.html" %}
{% block title %}{% if user %}Modifier{% else %}Nouvel{% endif %} utilisateur - Administration{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">
          <i class="bi bi-person{% if user %}-gear{% else %}-plus{% endif %}"></i>
          {% if user %}Modifier l'utilisateur{% else %}Nouvel utilisateur{% endif %}
        </h5>
      </div>
      <div class="card-body">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="username" class="form-label">Nom d'utilisateur *</label>
            <input type="text" class="form-control" id="username" name="username"
                   value="{{ user.username if user else '' }}" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">
              Mot de passe {% if user %}(laisser vide pour ne pas changer){% else %}*{% endif %}
            </label>
            <input type="password" class="form-control" id="password" name="password"
                   {% if not user %}required{% endif %} minlength="8">
            <div class="form-text">Minimum 8 caracteres.</div>
          </div>

          <div class="mb-3">
            <label for="role_id" class="form-label">Role</label>
            <select class="form-select" id="role_id" name="role_id">
              <option value="">- Aucun role -</option>
              {% for role in roles %}
              <option value="{{ role.id }}"
                      {% if user and user.role_id == role.id %}selected{% endif %}>
                {{ role.nom }}{% if role.description %} - {{ role.description }}{% endif %}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg"></i> {% if user %}Enregistrer{% else %}Creer{% endif %}
            </button>
            <a href="{{ url_for('admin.utilisateurs') }}" class="btn btn-outline-secondary">
              Annuler
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
