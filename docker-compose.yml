name: arche

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - pdf_data:/data/modes-degrades
      - db_data:/app/instance
      - ./logs:/app/logs
    environment:
      # Surcharge les valeurs de .env pour garantir le mode production
      FLASK_ENV: production
      STORAGE_DIR: /data/modes-degrades
      # Gunicorn sert HTTP dans le conteneur. Activez ces options seulement
      # derrière un reverse proxy TLS qui nettoie les en-têtes Forwarded.
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      TZ: Europe/Paris
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
volumes:
  pdf_data:
  db_data:
