version: "3.9"

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - pdf_data:/data/modes-degrades
      - db_data:/app/instance
      - ./logs:/app/logs
    environment:
      # Surcharge les valeurs de .env pour garantir le mode production
      FLASK_ENV: production
      TZ: Europe/Paris
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pdf_data:
  db_data:
